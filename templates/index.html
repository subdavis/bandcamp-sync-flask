<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandcampSync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f5f5f5;
        }
        
        .header {
            background: white;
            border-bottom: 1px solid #e9ecef;
            padding: 12px;
            flex-shrink: 0;
        }
        
        h1 {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .config-display {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 11px;
            line-height: 1.3;
        }
        
        .config-item {
            margin-bottom: 4px;
        }
        
        .config-key {
            font-weight: bold;
            color: #0056b3;
            display: inline-block;
            width: 80px;
        }
        
        .config-value {
            color: #495057;
        }
        
        .controls {
            background: white;
            border-bottom: 1px solid #e9ecef;
            padding: 12px;
            flex-shrink: 0;
        }
        
        button {
            background-color: #007cba;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 8px;
            font-weight: 500;
            touch-action: manipulation;
        }
        
        button:hover {
            background-color: #005a87;
        }
        
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        #abortBtn {
            background-color: #dc3545;
        }
        
        #abortBtn:hover {
            background-color: #c82333;
        }
        
        .status {
            padding: 8px 12px;
            font-weight: 500;
            font-size: 14px;
            margin-top: 8px;
            border-radius: 4px;
        }
        
        .status.idle { background-color: #e9ecef; color: #495057; }
        .status.running { background-color: #cce5ff; color: #0056b3; }
        .status.completed { background-color: #d4edda; color: #155724; }
        .status.failed { background-color: #f8d7da; color: #721c24; }
        .status.aborted { background-color: #fff3cd; color: #856404; }
        
        .error {
            color: #dc3545;
            margin: 8px 12px;
            font-weight: 500;
            font-size: 14px;
        }
        
        .log-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        #logContainer {
            background-color: #1a1a1a;
            color: #f0f0f0;
            padding: 12px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            line-height: 1.3;
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            h1 {
                font-size: 16px;
            }
            
            .config-display {
                font-size: 10px;
                padding: 8px;
            }
            
            .config-key {
                width: 70px;
            }
            
            button {
                padding: 8px 12px;
                font-size: 13px;
            }
            
            #logContainer {
                font-size: 11px;
                padding: 8px;
            }
            
            .header, .controls {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>BandcampSync</h1>
        <div class="config-display">
            <div class="config-item">
                <span class="config-key">Directory:</span>
                <span class="config-value">{{ config.directory or "(not set)" }}</span>
            </div>
            <div class="config-item">
                <span class="config-key">Format:</span>
                <span class="config-value">{{ config.format or "flac" }}</span>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button type="button" id="startBtn">Start Sync</button>
        <button type="button" id="abortBtn" disabled>Abort</button>
        
        <div id="status" class="status idle">Ready to start</div>
        <div id="error" class="error" style="display: none;"></div>
    </div>
    
    <div class="log-container">
        <div id="logContainer" style="display: none;"></div>
    </div>

    <script>
        let eventSource = null;
        let currentStatus = 'idle';
        
        const startBtn = document.getElementById('startBtn');
        const abortBtn = document.getElementById('abortBtn');
        const statusDiv = document.getElementById('status');
        const errorDiv = document.getElementById('error');
        const logContainer = document.getElementById('logContainer');
        
        function updateStatus(status) {
            currentStatus = status;
            statusDiv.className = `status ${status}`;
            
            switch(status) {
                case 'idle':
                    statusDiv.textContent = 'Ready to start';
                    startBtn.disabled = false;
                    abortBtn.disabled = true;
                    break;
                case 'running':
                    statusDiv.textContent = 'Sync in progress...';
                    startBtn.disabled = true;
                    abortBtn.disabled = false;
                    break;
                case 'completed':
                    statusDiv.textContent = 'Sync completed successfully';
                    startBtn.disabled = false;
                    abortBtn.disabled = true;
                    break;
                case 'failed':
                    statusDiv.textContent = 'Sync failed';
                    startBtn.disabled = false;
                    abortBtn.disabled = true;
                    break;
                case 'aborted':
                    statusDiv.textContent = 'Sync aborted';
                    startBtn.disabled = false;
                    abortBtn.disabled = true;
                    break;
            }
        }
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function hideError() {
            errorDiv.style.display = 'none';
        }
        
        function connectToLogs() {
            console.log('Connecting to log stream...');
            if (eventSource) {
                eventSource.close();
            }
            
            eventSource = new EventSource('/logs');
            
            eventSource.onmessage = function(event) {
                const data = event.data;
                
                if (data.startsWith('__STATUS__')) {
                    const status = data.replace('__STATUS__', '');
                    updateStatus(status);
                    // Close connection if job is finished to prevent auto-reconnect
                    if (status !== 'running') {
                        console.log('Job finished, closing log stream');
                        eventSource.close();
                        eventSource = null;
                    }
                } else {
                    logContainer.style.display = 'flex';
                    logContainer.textContent += data + '\n';
                    logContainer.scrollTop = logContainer.scrollHeight;
                }
            };
            
            eventSource.onerror = function(event) {
                // Prevent auto-reconnect if job is not running
                if (currentStatus !== 'running') {
                    console.log('Log stream closed, not reconnecting (job not running)');
                    eventSource.close();
                    eventSource = null;
                }
            };
        }
        
        // Check current status on page load
        fetch('/status')
            .then(response => response.json())
            .then(data => {
                updateStatus(data.status);
                if (data.status === 'running' || data.log_count > 0) {
                    connectToLogs();
                }
            })
            .catch(err => console.log('Status check failed:', err));
        
        startBtn.addEventListener('click', function() {
            hideError();
            
            fetch('/start', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    logContainer.textContent = '';
                    connectToLogs();
                }
            })
            .catch(err => {
                showError('Failed to start sync: ' + err.message);
            });
        });
        
        abortBtn.addEventListener('click', function() {
            fetch('/abort', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                }
            })
            .catch(err => {
                showError('Failed to abort sync: ' + err.message);
            });
        });
    </script>
</body>
</html>
